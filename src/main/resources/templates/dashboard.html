<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>書籍管理</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-4">
      <h2>書籍列表</h2>
      <form method="post" th:action="@{/logout}">
        <button class="btn btn-outline-danger">登出</button>
      </form>

      <div id="app">
        <!-- 書籍清單 -->
        <table class="table table-bordered table-hover bg-white">
          <thead class="table-dark">
            <tr>
              <th>書名</th>
              <th>作者</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="book in data.books" :key="book.id">
              <td>{{ book.title }}</td>
              <td>{{ book.author }}</td>
              <td>
                <button class="btn btn-danger btn-sm" @click="remove(book.id)">
                  刪除
                </button>
              </td>
            </tr>
          </tbody>
        </table>

        <hr />

        <!-- 新增表單 -->
        <h5>新增書籍</h5>
        <div class="mb-2">
          <input
            class="form-control"
            v-model="data.form.title"
            placeholder="書名"
          />
        </div>
        <div class="mb-2">
          <input
            class="form-control"
            v-model="data.form.author"
            placeholder="作者"
          />
        </div>
        <button class="btn btn-primary" @click="save">新增</button>

        <p class="mt-2 text-success">{{ data.msg }}</p>
      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
      const { createApp, reactive, onMounted } = Vue;

      createApp({
        setup() {
          // 所有資料集中放在這裡
          const data = reactive({
            books: [], // 書籍清單
            form: {
              // 新增表單資料
              title: "",
              author: "",
            },
            msg: "", // 訊息
          });

          // 取得所有書籍
          async function fetchBooks() {
            const res = await fetch("/api/books");
            data.books = await res.json();
          }

          // 新增書籍
          async function save() {
            await fetch("/api/books", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data.form), // 把表單資料轉成 JSON 送出
            });
            data.msg = "新增成功";
            data.form = { title: "", author: "" }; // 清空表單
            fetchBooks(); // 重新載入列表
          }

          // 刪除書籍
          async function remove(id) {
            await fetch(`/api/books/${id}`, { method: "DELETE" });
            data.msg = "刪除成功";
            fetchBooks(); // 重新載入列表
          }

          onMounted(fetchBooks); // 頁面載入時自動取得書籍

          return { data, save, remove };
        },
      }).mount("#app");
    </script>
  </body>
</html>
