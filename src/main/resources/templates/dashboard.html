<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <span class="navbar-brand">會員系統</span>
        <form method="post" th:action="@{/logout}" class="d-inline">
          <button type="submit" class="btn btn-outline-light btn-sm">
            登出
          </button>
        </form>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-header">
              <h5 class="mb-0">個人資料</h5>
            </div>
            <div class="card-body">
              <table class="table table-borderless mb-0">
                <tr>
                  <td class="text-muted" width="30%">帳號</td>
                  <td th:text="${user.username}"></td>
                </tr>
                <tr>
                  <td class="text-muted">Email</td>
                  <td th:text="${user.email}"></td>
                </tr>
                <tr>
                  <td class="text-muted">姓名</td>
                  <td th:text="${user.fullName} ?: '未填寫'"></td>
                </tr>
                <tr>
                  <td class="text-muted">電話</td>
                  <td th:text="${user.phone} ?: '未填寫'"></td>
                </tr>
                <tr>
                  <td class="text-muted">生日</td>
                  <td th:text="${user.birthDate} ?: '未填寫'"></td>
                </tr>
                <tr>
                  <td class="text-muted">註冊時間</td>
                  <td
                    th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"
                  ></td>
                </tr>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
