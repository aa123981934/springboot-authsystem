<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>會員註冊</title>
  <style>
    .error { color: red; font-size: 0.8em; }
    .alert { color: blue; font-weight: bold; }
  </style>
</head>
<body>
<h2>建立新帳號</h2>

<div th:if="${error}" class="error" th:text="${error}"></div>

<form th:action="@{/register}" th:object="${userDto}" method="post">

  <div>
    <label>帳號:</label>
    <input type="text" th:field="*{username}" />
    <span class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
  </div>

  <div>
    <label>密碼:</label>
    <input type="password" th:field="*{password}" placeholder="至少 8 位"/>
    <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
  </div>

  <div>
    <label>Email:</label>
    <input type="email" th:field="*{email}" />
    <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
  </div>

  <div>
    <label>全名:</label>
    <input type="text" th:field="*{fullName}" />
  </div>

  <div>
    <label>電話:</label>
    <input type="text" th:field="*{phone}" />
  </div>

  <button type="submit">立即註冊</button>
</form>

<p><a th:href="@{/login}">已有帳號？前往登入</a></p>
</body>
</html>
